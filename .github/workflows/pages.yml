name: Publish to GitHub Pages

# Pages is served from the gh-pages branch; this mirrors main into it
# on every push, so the site always matches main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push main to gh-pages
        run: git push --force origin HEAD:gh-pages
